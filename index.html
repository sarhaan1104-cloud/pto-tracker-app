<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTO Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: #fff; border-radius: 20px; padding: 40px 36px;
  max-width: 420px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.2); text-align: center;
}
.logo { font-size: 3rem; margin-bottom: 16px; }
h1 { font-size: 1.6rem; font-weight: 800; color: #1a202c; margin-bottom: 8px; }
p { color: #718096; font-size: 0.9rem; line-height: 1.6; margin-bottom: 32px; }
.btn {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  font-size: 1rem; font-weight: 700; text-decoration: none;
  margin-bottom: 12px; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.88; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.btn-secondary { background: #f0f4f8; color: #4a5568; }
.note { font-size: 0.74rem; color: #a0aec0; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📋</div>
  <h1>PTO Tracker</h1>
  <p>Track your PTO balance, accruals, and usage. Works offline and installs as an app on your phone.</p>
  <a class="btn btn-primary" href="./pto-tracker.html">My Tracker</a>
  <a class="btn btn-secondary" href="./pto-tracker-share.html">Configurable Tracker</a>
  <p class="note">Your data stays on your device — nothing is sent to any server.</p>
</div>
</body>
</html>
